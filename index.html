<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Profit Problem</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a252f;
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.95rem;
      color: #5d6d7e;
      max-width: 580px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .input-group {
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #34495e;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #d5dbdb;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #3498db;
    }

    input[type="number"].error {
      border-color: #e74c3c;
    }

    .error-msg {
      font-size: 0.825rem;
      color: #e74c3c;
      min-height: 18px;
    }

    button {
      align-self: flex-start;
      margin-top: 24px;
      padding: 11px 28px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover {
      background: #2980b9;
    }

    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Max Profit Problem</h1>
      <p>
        Given <em>n</em> time units, choose the mix of Theatres, Pubs, and Commercial Parks
        to build sequentially that maximizes total earnings from operational time.
      </p>
    </header>

    <div class="card">
      <div class="input-row">
        <div class="input-group">
          <label for="timeInput">Time units available (n)</label>
          <input
            type="number"
            id="timeInput"
            min="0"
            step="1"
            placeholder="e.g. 13"
            autocomplete="off"
          />
          <span class="error-msg" id="errorMsg"></span>
        </div>
        <button id="calcBtn">Calculate</button>
      </div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // Building catalogue
    //
    // Each building has:
    //   - buildTime: units of time required to construct it
    //   - rate: earnings per unit of time once operational
    //
    // Priority (rate / buildTime) determines optimal build order when a given
    // count of each type is chosen:
    //   Theatre = 1500/5 = 300 (highest)
    //   Pub     = 1000/4 = 250
    //   Park    = 2000/10 = 200 (lowest)
    // -------------------------------------------------------------------------
    var BUILDINGS = {
      T: { key: 'T', label: 'Theatre',         buildTime: 5,  rate: 1500 },
      P: { key: 'P', label: 'Pub',             buildTime: 4,  rate: 1000 },
      C: { key: 'C', label: 'Commercial Park', buildTime: 10, rate: 2000 }
    };

    // Build order matters: putting higher rate/buildTime first maximizes profit.
    // The swap argument shows adjacent swaps only improve if sorted this way.
    var BUILD_ORDER = ['T', 'P', 'C'];

    // -------------------------------------------------------------------------
    // Input parsing & validation
    //
    // n must be a non-negative integer. We cap it at a reasonable bound so the
    // UI can't DOS itself on a pasted million-digit value.
    // -------------------------------------------------------------------------
    var MAX_N = 500;

    function parseInput(raw) {
      var trimmed = String(raw).trim();
      if (trimmed === '') {
        return { error: 'Please enter a time value.' };
      }
      if (!/^\d+$/.test(trimmed)) {
        return { error: 'Only non-negative integers are allowed.' };
      }
      var n = parseInt(trimmed, 10);
      if (n > MAX_N) {
        return { error: 'Too large. Maximum allowed is ' + MAX_N + '.' };
      }
      return { n: n };
    }

    // -------------------------------------------------------------------------
    // Earnings computation for a fixed (t, p, c) mix built in priority order
    //
    // Building i is operational from time (cumulative build times up to i) to n,
    // so its earnings = rate_i * (n - end_time_i).
    // -------------------------------------------------------------------------
    function earningsFor(counts, n) {
      var current = 0;
      var total = 0;

      for (var b = 0; b < BUILD_ORDER.length; b++) {
        var key = BUILD_ORDER[b];
        var spec = BUILDINGS[key];
        var count = counts[key];

        for (var i = 0; i < count; i++) {
          current += spec.buildTime;
          if (current > n) return -1; // ran out of time mid-build
          total += spec.rate * (n - current);
        }
      }
      return total;
    }

    // -------------------------------------------------------------------------
    // Search every valid (t, p, c) combination, collecting all ties at max
    //
    // Bounded enumeration: at most floor(n/4) + 1 pubs per axis, and similar
    // bounds on theatres and parks, so the search space stays tiny.
    // -------------------------------------------------------------------------
    function solve(n) {
      var maxT = Math.floor(n / BUILDINGS.T.buildTime);
      var maxP = Math.floor(n / BUILDINGS.P.buildTime);
      var maxC = Math.floor(n / BUILDINGS.C.buildTime);

      var best = 0;
      var solutions = [];

      for (var t = 0; t <= maxT; t++) {
        for (var p = 0; p <= maxP; p++) {
          for (var c = 0; c <= maxC; c++) {
            if (t === 0 && p === 0 && c === 0) continue;
            if (5 * t + 4 * p + 10 * c > n) continue;

            var profit = earningsFor({ T: t, P: p, C: c }, n);
            if (profit < 0) continue;

            if (profit > best) {
              best = profit;
              solutions = [{ T: t, P: p, C: c }];
            } else if (profit === best && best > 0) {
              solutions.push({ T: t, P: p, C: c });
            }
          }
        }
      }

      return { earnings: best, solutions: solutions };
    }
  </script>
</body>
</html>
