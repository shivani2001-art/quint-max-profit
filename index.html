<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Profit Problem</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a252f;
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.95rem;
      color: #5d6d7e;
      max-width: 580px;
      margin: 0 auto;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Max Profit Problem</h1>
      <p>
        Given <em>n</em> time units, choose the mix of Theatres, Pubs, and Commercial Parks
        to build sequentially that maximizes total earnings from operational time.
      </p>
    </header>
  </div>
</body>
</html>
